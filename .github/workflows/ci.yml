name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc -p tsconfig.json --noEmit

      - name: Unit tests
        run: npm run test:unit

      - name: Build (webview + host)
        run: npm run build

      - name: Integration tests (headless VS Code)
        run: xvfb-run -a npm run test:integration

      - name: Package VSIX
        run: npx vsce package -o aurora-preview.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurora-preview-vsix
          path: aurora-preview.vsix
