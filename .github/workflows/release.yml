name: Release

# Publish when a version tag is pushed, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create the GitHub Release

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test:unit

      - name: Build (webview + host)
        run: npm run build

      - name: Package VSIX
        run: npx vsce package -o aurora-preview.vsix

      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: npx vsce publish --packagePath aurora-preview.vsix --pat "$VSCE_PAT"

      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        continue-on-error: true
        run: npx ovsx publish aurora-preview.vsix --pat "$OVSX_PAT"

      - name: Create GitHub Release
        # Pinned to an immutable commit SHA (v2) — this job holds VSCE_PAT, so a
        # mutable third-party tag must not be trusted.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: aurora-preview.vsix
          generate_release_notes: true
