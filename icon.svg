  <rect x="0" y="0" width="512" height="512" fill="url(#br)"/>

  <g fill="none" stroke="url(#aur)" stroke-width="50" stroke-linecap="round" stroke-linejoin="round">
    <!-- M -->
    <polyline points="106,360 106,150 208,258 310,150 310,360"/>
    <!-- down arrow -->
    <line x1="396" y1="150" x2="396" y2="322"/>
    <polyline points="349,279 396,344 443,279"/>
