<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aur" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5ef0c0"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#b06bff"/>
    </linearGradient>
    <radialGradient id="tl" cx="8%" cy="2%" r="80%">
      <stop offset="0" stop-color="#4cd7b0" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#4cd7b0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="br" cx="98%" cy="102%" r="80%">
